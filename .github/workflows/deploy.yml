name: Deploy infra tienda-tech

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform

jobs:
  deploy:
    name: Terraform apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Learner Lab temp creds)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Generate S3 backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tienda-tech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Write tfvars
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > ci.auto.tfvars <<EOF
          admin_ip_cidr         = "${{ secrets.ADMIN_IP_CIDR }}"
          create_key_pair       = false
          key_pair_name         = "vockey"
          instance_profile_name = "LabInstanceProfile"
          db_password           = "${{ secrets.DB_PASSWORD }}"
          EOF

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Resumen
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "EC2 IP:        $(terraform output -raw ec2_public_ip)"
          echo "RDS endpoint:  $(terraform output -raw rds_endpoint)"
          echo "ECR registry:  $(terraform output -raw ecr_registry)"
          echo ""
          echo "App pendiente. Build/push imagenes + SSH para desplegar."
