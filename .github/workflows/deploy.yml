name: Deploy tienda-tech

on:
  push:
    branches: [main]
    paths:
      - 'tienda-tech-backend/**'
      - 'tienda-tech-frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag para imagenes Docker'
        required: false
        default: 'latest'
      force_recreate:
        description: 'Forzar recreacion EC2 (true/false)'
        required: false
        default: 'false'

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:
  deploy:
    name: Build + Terraform apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Learner Lab temp creds)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account id
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Generate S3 backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tienda-tech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Write tfvars
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > ci.auto.tfvars <<EOF
          admin_ip_cidr         = "${{ secrets.ADMIN_IP_CIDR }}"
          create_key_pair       = true
          key_pair_name         = "tienda-tech-key"
          ssh_public_key        = "${{ secrets.SSH_PUBLIC_KEY }}"
          instance_profile_name = "LabInstanceProfile"
          db_password           = "${{ secrets.DB_PASSWORD }}"
          image_tag             = "${{ env.IMAGE_TAG }}"
          EOF

      - name: Terraform apply (ECR only)
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -target=module.ecr -auto-approve

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push backend image
        env:
          REGISTRY: ${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          docker build -t $REGISTRY/tienda-tech-backend:${{ env.IMAGE_TAG }} \
                       -t $REGISTRY/tienda-tech-backend:${{ github.sha }} \
                       ./tienda-tech-backend
          docker push $REGISTRY/tienda-tech-backend:${{ env.IMAGE_TAG }}
          docker push $REGISTRY/tienda-tech-backend:${{ github.sha }}

      - name: Build + push frontend image
        env:
          REGISTRY: ${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          docker build -t $REGISTRY/tienda-tech-frontend:${{ env.IMAGE_TAG }} \
                       -t $REGISTRY/tienda-tech-frontend:${{ github.sha }} \
                       ./tienda-tech-frontend
          docker push $REGISTRY/tienda-tech-frontend:${{ env.IMAGE_TAG }}
          docker push $REGISTRY/tienda-tech-frontend:${{ github.sha }}

      - name: Terraform apply (full)
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Capturar IP publica
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: echo "public_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.tf.outputs.public_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Esperar a que EC2 cloud-init termine
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                ec2-user@${{ steps.tf.outputs.public_ip }} \
                "test -f /opt/tienda-tecnologica/docker-compose.yml" 2>/dev/null; then
              echo "EC2 listo"
              exit 0
            fi
            echo "Esperando EC2... ($i/30)"
            sleep 20
          done
          echo "EC2 no respondio a tiempo"
          exit 1

      - name: Redeploy contenedores en EC2 (pull + up)
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ steps.tf.outputs.public_ip }} <<'REMOTE'
          set -e
          cd /opt/tienda-tecnologica
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker compose pull
          docker compose up -d
          docker ps
          REMOTE

      - name: Resumen
        run: |
          echo "Frontend: http://${{ steps.tf.outputs.public_ip }}"
          echo "Backend:  http://${{ steps.tf.outputs.public_ip }}:3001/api/health"
